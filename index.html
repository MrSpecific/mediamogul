<!doctype html>
<!-- `dark` opts the Neon Auth UI (Tailwind) into its dark palette to match the
     app's dark base-ic Theme. -->
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover"
    />
    <meta name="theme-color" content="#E0871B" />

    <!-- Installable PWA (manifest link + registration are injected by
         vite-plugin-pwa; these cover iOS's non-standard install tags). -->
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="MediaMogul" />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />
    <title>Mediamogul — track everything you watch, read, and listen to</title>
    <meta
      name="description"
      content="Track the movies, TV, books, audiobooks, and magazines you consume — with ratings, reviews, lists, and a shared catalog."
    />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="mediamogul" />
    <meta property="og:url" content="" />
    <meta property="og:title" content="mediamogul" />
    <meta
      property="og:description"
      content="Track everything you watch, read, and listen to."
    />
    <meta property="og:image" content="/og.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="mediamogul" />
    <meta
      name="twitter:description"
      content="Track everything you watch, read, and listen to."
    />
    <meta name="twitter:image" content="/og.png" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
